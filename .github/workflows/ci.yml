name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verdict-extraction:
    name: Verdict-extraction regression (MYR-100)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Regression-test the claude-review verdict extractor
        run: bash scripts/verdict-extraction-test.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: packages/sdk/coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f packages/sdk/dist/index.js
          test -f packages/sdk/dist/index.cjs
          test -f packages/sdk/dist/index.d.ts
          test -f packages/sdk/dist/react.js
          test -f packages/sdk/dist/react.cjs
          test -f packages/sdk/dist/react.d.ts
          echo "All expected build artifacts present"

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/sdk/dist/
          if-no-files-found: error
          retention-days: 7

  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      # size-limit itself is a devDep, so npm ci is required — but the
      # built artifact is reused from the `build` job rather than rebuilt
      # (review suggestion #2: ~30-60s saved per run).
      - run: npm ci

      - name: Download dist from the build job
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: packages/sdk/dist/

      - name: Measure gzipped bundle size (NFR-3.30)
        id: size
        run: |
          set +e
          # --silent strips the npm-script preamble so the artifact + PR
          # comment are pure size-limit output (review suggestion #5).
          npm run --silent size | tee size-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Capture machine-readable form for the trend artifact even on breach.
          npm run --silent size:json > size-report.json 2>/dev/null || true
          set -e

      - name: Assert total stays under the NFR-3.30 sum budget
        run: |
          # size-limit enforces per-entry caps; this guards the documented
          # "sum < 75 KB" invariant explicitly so it can't silently drift
          # if a per-entry cap is ever loosened (review suggestion #4).
          node -e '
            const r = require("./size-report.json");
            const total = r.reduce((s, e) => s + (e.size || 0), 0);
            const BUDGET = 75 * 1024;
            console.log(`Total gzipped: ${total} B (budget ${BUDGET} B)`);
            if (total > BUDGET) {
              console.error(`::error::Total bundle ${total} B exceeds the ${BUDGET} B NFR-3.30 sum budget`);
              process.exit(1);
            }
          '

      - name: Upload size report (trend artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-report
          path: |
            size-report.json
            size-output.txt
          if-no-files-found: warn
          retention-days: 90

      - name: Upsert PR comment if over budget
        if: steps.size.outputs.exit_code != '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          MARKER="<!-- bundle-size-report -->"
          {
            echo "$MARKER"
            echo "## Bundle size over budget (NFR-3.30)"
            echo ""
            echo "The gzipped bundle exceeds its budget. Budget: core < 55 KB, react < 20 KB, total < 75 KB."
            echo ""
            echo '```'
            cat size-output.txt
            echo '```'
            echo ""
            echo "See \`packages/sdk/CONTRIBUTING.md\` → **Bundle budget** for how to inspect locally and what is allowed to be added."
          } > comment.md
          # Upsert: update the existing marked comment in place rather than
          # appending a new one on every breached push (review suggestion #1).
          EXISTING=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            --jq "map(select(.body | startswith(\"${MARKER}\"))) | .[0].id // empty")
          if [ -n "$EXISTING" ]; then
            gh api "repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="$(cat comment.md)" >/dev/null
          else
            gh pr comment "$PR" --body-file comment.md
          fi

      - name: Fail the build if over budget
        if: steps.size.outputs.exit_code != '0'
        run: |
          echo "::error::Bundle size exceeds the NFR-3.30 budget — see the PR comment and the bundle-size-report artifact."
          exit 1
