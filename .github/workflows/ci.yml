name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run test

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: packages/sdk/coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f packages/sdk/dist/index.js
          test -f packages/sdk/dist/index.cjs
          test -f packages/sdk/dist/index.d.ts
          test -f packages/sdk/dist/react.js
          test -f packages/sdk/dist/react.cjs
          test -f packages/sdk/dist/react.d.ts
          echo "All expected build artifacts present"

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: packages/sdk/dist/
          if-no-files-found: error
          retention-days: 7

  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Measure gzipped bundle size (NFR-3.30)
        id: size
        run: |
          set +e
          npm run size | tee size-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Capture machine-readable form for the trend artifact even on breach.
          npm run size:json > size-report.json 2>/dev/null || true
          set -e

      - name: Upload size report (trend artifact)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-report
          path: |
            size-report.json
            size-output.txt
          if-no-files-found: warn
          retention-days: 90

      - name: Comment on PR if over budget
        if: steps.size.outputs.exit_code != '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Bundle size over budget (NFR-3.30)"
            echo ""
            echo "The gzipped bundle exceeds its budget. Budget: core < 55 KB, react < 20 KB, total < 75 KB."
            echo ""
            echo '```'
            cat size-output.txt
            echo '```'
            echo ""
            echo "See \`packages/sdk/CONTRIBUTING.md\` → **Bundle budget** for how to inspect locally and what is allowed to be added."
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md

      - name: Fail the build if over budget
        if: steps.size.outputs.exit_code != '0'
        run: |
          echo "::error::Bundle size exceeds the NFR-3.30 budget — see the PR comment and the bundle-size-report artifact."
          exit 1
