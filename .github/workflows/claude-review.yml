name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # ─── Automatic PR Review ────────────────────────────────────────────
  # Runs on every PR open/update. Reads labels to determine domain focus.
  review:
    name: Claude Review
    if: >-
      github.event_name == 'pull_request' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Generate a short-lived (~1h) installation token from the
      # `myrobotaxi-pr-review` GitHub App, owned by the org. App-issued
      # tokens are accepted by branch protection's "required approving
      # reviews" rule and the App identity does not consume a billable
      # seat (replaces the previous tnando-gh-bot collaborator).
      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Collect PR context
        id: context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"

          AGENT_LABELS=$(gh pr view "$PR_NUM" --json labels -q '[.labels[].name | select(startswith("agent:"))] | join(", ")')
          echo "agent_labels=${AGENT_LABELS}" >> "$GITHUB_OUTPUT"

          LINEAR_TICKET=$(gh pr view "$PR_NUM" --json body -q '.body' | grep -oP 'MYR-\d+' | head -1 || echo "")
          echo "linear_ticket=${LINEAR_TICKET}" >> "$GITHUB_OUTPUT"

          echo "Agent labels: ${AGENT_LABELS:-none}"
          echo "Linear ticket: ${LINEAR_TICKET:-none}"

      - name: Run Claude review
        # Pinned to v1.0.104 — same version as the telemetry repo. v1.0.105
        # broke the action with an internal "directory mismatch for
        # tsconfig.json" error.
        uses: anthropics/claude-code-action@b4d67413279fc18c6e5de930ae307c4f108714eb # v1.0.104
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          use_sticky_comment: true
          track_progress: true
          claude_args: >-
            --agent pr-reviewer
            --max-turns 50
          prompt: |
            Review this pull request.

            ## PR Context
            - **PR #${{ github.event.pull_request.number }}**: ${{ github.event.pull_request.title }}
            - **Agent labels**: ${{ steps.context.outputs.agent_labels || 'none (apply general TypeScript SDK review only)' }}
            - **Linear ticket**: ${{ steps.context.outputs.linear_ticket || 'none' }}

            ## Instructions

            1. Run `gh pr diff ${{ github.event.pull_request.number }}` to see all changes
            2. Read README.md and packages/sdk/CONTRIBUTING.md for project rules
            3. Apply general TypeScript SDK review:
               - Strict TS hygiene (no `any`, no implicit returns, narrow types)
               - Bundle-size impact (<75KB gzipped budget — flag any new heavy dep)
               - Logic-only rule: no UI / map / theming / state-framework deps (NFR-3.32)
               - Browser + Node + React isomorphism (no Node-only or browser-only globals without a guard)
               - Test coverage for new public surface; table-driven vitest pattern
            4. If `agent:sdk-architect` label is present, additionally verify the change matches the contract docs in https://github.com/myrobotaxi/my-robo-taxi-telemetry/tree/main/docs/contracts
            5. End your review with a verdict tag (see pr-reviewer agent instructions in `.claude/agents/pr-reviewer.md`).

            Focus on real issues, not style nits. If the code is clean and well-tested, approve it.

      - name: Extract review verdict
        id: verdict
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"

          LAST_COMMENT=$(gh api "repos/${{ github.repository }}/issues/${PR_NUM}/comments" \
            --jq 'last | .body')

          # ── Pass 1: strict machine-readable tag (the format the
          # pr-reviewer agent file instructs Claude to use). ──
          VERDICT=$(echo "$LAST_COMMENT" \
            | grep -oP '<!--[[:space:]]*VERDICT:[[:space:]]*\K(APPROVE|REQUEST_CHANGES|COMMENT)' \
            | tail -1 || true)

          # ── Pass 2: **Verdict:** bold markdown (also common). ──
          if [ -z "$VERDICT" ]; then
            VERDICT=$(echo "$LAST_COMMENT" \
              | grep -oP '\*\*Verdict:\*\*[[:space:]]*\K(APPROVE|REQUEST_CHANGES|COMMENT)' \
              | tail -1 || true)
          fi

          # ── Pass 3: prose detection inside a "Verdict" section. ──
          # Claude sometimes writes "### Verdict\n…approved…no blocking
          # issues…" rather than the strict tag. Detect the sentiment
          # from the prose so substantively-approving reviews aren't
          # mis-classified as inconclusive COMMENT verdicts.
          #
          # Order matters: REQUEST_CHANGES wins on explicit "request
          # changes" phrasing. APPROVE wins on "approved" / "no blocking
          # issues" / "LGTM" / "ship it". Otherwise → COMMENT.
          if [ -z "$VERDICT" ]; then
            VERDICT_LINE=$(echo "$LAST_COMMENT" | grep -nE -i '^#{1,6}[[:space:]]+Verdict|^\*\*Verdict[:*]' | head -1 | cut -d: -f1 || true)
            if [ -n "$VERDICT_LINE" ]; then
              VERDICT_BODY=$(echo "$LAST_COMMENT" | tail -n +"$VERDICT_LINE")
            else
              VERDICT_BODY="$LAST_COMMENT"
            fi

            if echo "$VERDICT_BODY" | grep -qiE '\brequest[[:space:]_-]?changes\b|\brequesting[[:space:]]+changes\b|\bneeds?[[:space:]]+changes\b|\bblocker(s)?\b|\bblocking[[:space:]]+(issue|problem|item)s?[[:space:]]+(found|identified|present)\b'; then
              VERDICT="REQUEST_CHANGES"
              echo "::notice::Verdict extracted via prose fallback: REQUEST_CHANGES"
            elif echo "$VERDICT_BODY" | grep -qiE '\bapproved?\b|\bno[[:space:]]+blocking[[:space:]]+issues?\b|\blgtm\b|\blooks[[:space:]]+good[[:space:]]+to[[:space:]]+(merge|ship|go)\b|\bship[[:space:]]+it\b|\bready[[:space:]]+to[[:space:]]+merge\b|\bcorrectly[[:space:]]+resolved\b'; then
              VERDICT="APPROVE"
              echo "::notice::Verdict extracted via prose fallback: APPROVE"
            fi
          fi

          if [ -z "$VERDICT" ]; then
            echo "::warning::No verdict found in Claude's review (no tag, no recognized prose). Defaulting to COMMENT."
            VERDICT="COMMENT"
          fi

          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "Extracted verdict: $VERDICT"

      - name: Submit review verdict
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          VERDICT="${{ steps.verdict.outputs.verdict }}"

          case "$VERDICT" in
            APPROVE)
              gh pr review "$PR_NUM" --approve --body "Claude AI review: **Approved** — all checks passed."
              ;;
            REQUEST_CHANGES)
              gh pr review "$PR_NUM" --request-changes --body "Claude AI review: **Changes requested** — see review comment above for details."
              ;;
            *)
              gh pr review "$PR_NUM" --comment --body "Claude AI review: **Comment** — see review comment above for details."
              ;;
          esac

  # ─── Interactive @claude Responses ──────────────────────────────────
  interactive:
    name: Claude Interactive
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: anthropics/claude-code-action@b4d67413279fc18c6e5de930ae307c4f108714eb # v1.0.104
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: >-
            --max-turns 10
